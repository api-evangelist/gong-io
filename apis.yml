aid: gong-io
url: https://raw.githubusercontent.com/api-evangelist/gong-io/refs/heads/main/apis.yml
name: Gong
kind: company
description: >-
  Gong is the Revenue AI platform that captures customer interactions across
  phone, web conferencing, and email, then applies conversation intelligence and
  generative AI to coach reps, forecast pipeline, and surface deal risk. Gong
  exposes a REST API at api.gong.io covering Calls, Users, Stats, Library,
  Settings, Workspaces, Permissions, Data Privacy, CRM, Logs, Engagement, and
  webhook-style automation rules, plus an outbound data integrations program for
  pushing call recordings, transcripts, and metadata into Gong from third-party
  telephony and conferencing systems.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Revenue Intelligence
  - Conversation Intelligence
  - Sales
  - AI
  - CRM
  - Coaching
  - Forecasting
created: '2026-05-23'
modified: '2026-05-23'
specificationVersion: '0.19'
apis:
  - aid: gong-io:public-api
    name: Gong Public API
    description: >-
      Gong's primary REST API for reading and writing platform data — calls,
      users, stats, library content, settings, workspaces, permissions, data
      privacy, CRM data, audit logs, and engagement. Authentication is via Basic
      auth (access key + secret) generated in the Gong company settings.
    humanURL: https://app.gong.io/settings/api/documentation
    baseURL: https://api.gong.io/v2
    tags:
      - REST
      - Calls
      - Users
      - Stats
    properties:
      - type: Documentation
        url: https://app.gong.io/settings/api/documentation
      - type: APIReference
        url: https://app.gong.io/settings/api/documentation
  - aid: gong-io:calls-api
    name: Gong Calls API
    description: >-
      Endpoints for retrieving call metadata, transcripts, media URLs, extensive
      filtering, and adding new calls (recordings and metadata) from external
      telephony and conferencing platforms.
    humanURL: https://app.gong.io/settings/api/documentation#/Calls
    baseURL: https://api.gong.io/v2/calls
    tags:
      - Calls
